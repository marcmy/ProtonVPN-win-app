name: Future version patch automation

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: Branch to use as the unpatched base
        required: true
        default: master
      source_patch_branch:
        description: Branch containing the split-tunnel patch, and optionally updater-skip hunks
        required: true
        default: marc/updater-skip-and-patch-automation
      target_branch:
        description: New branch to create for the patched version
        required: true
      target_version:
        description: Proton VPN release version to patch, for example 4.4.2
        required: true
      include_updater_skip:
        description: Also port updater/beta skip behavior from source_patch_branch
        type: boolean
        required: true
        default: false
      force_reset_target:
        description: Reset target_branch from base_branch if it already exists
        type: boolean
        required: true
        default: false
      upload_full_bin:
        description: Upload full src/bin output
        type: boolean
        required: true
        default: false

permissions:
  contents: write

jobs:
  patch-build:
    name: Patch future branch and build versioned installer
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23.x'
          cache: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', '**/NuGet.config', '**/global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Preserve automation and installer tools
        run: |
          $ErrorActionPreference = 'Stop'

          $tools = @(
            @{ Source = '.github/scripts/set-assembly-version.ps1'; Name = 'set-assembly-version.ps1' },
            @{ Source = '.github/scripts/stage-client-patch-output.ps1'; Name = 'stage-client-patch-output.ps1' },
            @{ Source = '.github/scripts/package-patch-artifacts.ps1'; Name = 'package-patch-artifacts.ps1' },
            @{ Source = 'scripts/New-ProtonVPNPatchSfx.ps1'; Name = 'New-ProtonVPNPatchSfx.ps1' },
            @{ Source = 'scripts/Install-ProtonVPNPatch.ps1'; Name = 'Install-ProtonVPNPatch.ps1' },
            @{ Source = 'scripts/Install-ProtonVPNPatch.cmd'; Name = 'Install-ProtonVPNPatch.cmd' }
          )

          foreach ($tool in $tools) {
            if (-not (Test-Path -LiteralPath $tool.Source -PathType Leaf)) {
              throw "Required automation tool was not found: $($tool.Source)"
            }

            Copy-Item -LiteralPath $tool.Source -Destination (Join-Path $env:RUNNER_TEMP $tool.Name) -Force
          }

      - name: Apply requested patch hunks
        id: apply_patch
        env:
          BASE_BRANCH: ${{ inputs.base_branch }}
          SOURCE_PATCH_BRANCH: ${{ inputs.source_patch_branch }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
          INCLUDE_UPDATER_SKIP: ${{ inputs.include_updater_skip }}
          FORCE_RESET_TARGET: ${{ inputs.force_reset_target }}
        run: |
          $ErrorActionPreference = 'Stop'
          $includeUpdaterSkip = [System.Convert]::ToBoolean($env:INCLUDE_UPDATER_SKIP)
          $forceResetTarget = [System.Convert]::ToBoolean($env:FORCE_RESET_TARGET)

          .\.github\scripts\apply-future-version-patch.ps1 `
            -BaseBranch $env:BASE_BRANCH `
            -SourcePatchBranch $env:SOURCE_PATCH_BRANCH `
            -TargetBranch $env:TARGET_BRANCH `
            -IncludeUpdaterSkip:$includeUpdaterSkip `
            -ForceResetTarget:$forceResetTarget

      - name: Stamp target app version
        id: target-version
        env:
          REQUESTED_TARGET_VERSION: ${{ inputs.target_version }}
        run: |
          $ErrorActionPreference = 'Stop'

          $requestedVersion = $env:REQUESTED_TARGET_VERSION.Trim()
          if ($requestedVersion -notmatch '^\d+\.\d+\.\d+(?:\.\d+)?$') {
            throw "target_version must be a numeric three- or four-part version. Received '$requestedVersion'."
          }

          $parsedVersion = [Version]::Parse($requestedVersion)
          $targetVersion = '{0}.{1}.{2}' -f $parsedVersion.Major, $parsedVersion.Minor, $parsedVersion.Build

          & (Join-Path $env:RUNNER_TEMP 'set-assembly-version.ps1') -TargetVersion $targetVersion

          git add src/GlobalAssemblyInfo.cs
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Target app version was already $targetVersion."
          }
          elseif ($LASTEXITCODE -eq 1) {
            git diff --cached --check
            git commit -m "Set app version to $targetVersion"
          }
          else {
            throw 'Unable to inspect staged app version changes.'
          }

          Write-Host "Exact installed target folder: v$targetVersion"
          "target_version=$targetVersion" >> $env:GITHUB_OUTPUT

      - name: Update submodules for patched branch
        run: |
          $ErrorActionPreference = 'Stop'
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Prepare artifact folders
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/logs | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts/ProtonVPN.Client.Patch | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts/Installer | Out-Null

      - name: Clean previous build output
        run: |
          Remove-Item -LiteralPath src/bin -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath artifacts/client-build-output -Recurse -Force -ErrorAction SilentlyContinue

      - name: Restore client project
        run: |
          $ErrorActionPreference = 'Stop'
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          dotnet restore src/Client/ProtonVPN.Client/ProtonVPN.Client.csproj --runtime win-x64 -bl:artifacts/logs/client-restore.binlog *>&1 |
            Tee-Object -FilePath artifacts/logs/client-restore.log

          if ($LASTEXITCODE -ne 0) {
            throw "Client restore failed with exit code $LASTEXITCODE"
          }

      - name: Restore service project
        run: |
          $ErrorActionPreference = 'Stop'
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          dotnet restore src/ProtonVPN.Service/ProtonVPN.Service.csproj --runtime win-x64 -bl:artifacts/logs/service-restore.binlog *>&1 |
            Tee-Object -FilePath artifacts/logs/service-restore.log

          if ($LASTEXITCODE -ne 0) {
            throw "Service restore failed with exit code $LASTEXITCODE"
          }

      - name: Build client project
        run: |
          $ErrorActionPreference = 'Stop'
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          dotnet build src/Client/ProtonVPN.Client/ProtonVPN.Client.csproj --configuration Release --runtime win-x64 --no-restore -p:Platform=x64 -v:minimal -bl:artifacts/logs/client-build.binlog *>&1 |
            Tee-Object -FilePath artifacts/logs/client-build.log

          if ($LASTEXITCODE -ne 0) {
            throw "Client build failed with exit code $LASTEXITCODE"
          }

      - name: Stage client patch build output
        run: |
          & (Join-Path $env:RUNNER_TEMP 'stage-client-patch-output.ps1')

      - name: Build service project
        run: |
          $ErrorActionPreference = 'Stop'
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          dotnet build src/ProtonVPN.Service/ProtonVPN.Service.csproj --configuration Release --runtime win-x64 --no-restore -p:Platform=x64 -v:minimal -bl:artifacts/logs/service-build.binlog *>&1 |
            Tee-Object -FilePath artifacts/logs/service-build.log

          if ($LASTEXITCODE -ne 0) {
            throw "Service build failed with exit code $LASTEXITCODE"
          }

      - name: Package versioned patch artifacts
        id: package
        env:
          TARGET_VERSION: ${{ steps.target-version.outputs.target_version }}
          TARGET_BRANCH: ${{ steps.apply_patch.outputs.target_branch }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          $ErrorActionPreference = 'Stop'
          $sourceCommit = (git rev-parse HEAD).Trim()

          & (Join-Path $env:RUNNER_TEMP 'package-patch-artifacts.ps1') `
            -BuildMode both `
            -TargetVersion $env:TARGET_VERSION `
            -SourceCommit $sourceCommit `
            -SourceRef $env:TARGET_BRANCH `
            -WorkflowRunId $env:WORKFLOW_RUN_ID `
            -BuilderPath (Join-Path $env:RUNNER_TEMP 'New-ProtonVPNPatchSfx.ps1') `
            -InstallerScriptPath (Join-Path $env:RUNNER_TEMP 'Install-ProtonVPNPatch.ps1') `
            -LauncherPath (Join-Path $env:RUNNER_TEMP 'Install-ProtonVPNPatch.cmd')

      - name: Push patched target branch
        env:
          FORCE_RESET_TARGET: ${{ inputs.force_reset_target }}
        run: |
          $ErrorActionPreference = 'Stop'
          $targetBranch = '${{ steps.apply_patch.outputs.target_branch }}'
          $targetExists = [System.Convert]::ToBoolean('${{ steps.apply_patch.outputs.target_exists }}')
          $forceResetTarget = [System.Convert]::ToBoolean($env:FORCE_RESET_TARGET)

          if ($targetExists -and $forceResetTarget) {
            git push --force-with-lease origin "HEAD:refs/heads/$targetBranch"
          }
          else {
            git push origin "HEAD:refs/heads/$targetBranch"
          }

      - name: Upload raw patch artifact
        uses: actions/upload-artifact@v7
        with:
          name: protonvpn-client-patch-${{ steps.target-version.outputs.target_version }}-both
          path: artifacts/ProtonVPN.Client.Patch
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: protonvpn-custom-patch-installer-${{ steps.target-version.outputs.target_version }}-both
          path: artifacts/Installer/*.exe
          if-no-files-found: error

      - name: Upload full bin artifact
        if: ${{ always() && inputs.upload_full_bin && hashFiles('src/bin/**') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: protonvpn-client-bin-${{ steps.target-version.outputs.target_version }}-both
          path: src/bin
          if-no-files-found: error

      - name: Upload build logs
        if: ${{ always() && hashFiles('artifacts/logs/**') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: protonvpn-client-patch-logs-${{ steps.target-version.outputs.target_version }}-both
          path: artifacts/logs
          if-no-files-found: ignore

name: Windows fast patch build

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: What to build
        type: choice
        default: client
        options:
          - client
          - service
          - both
      upload_full_bin:
        description: Upload full src/bin output
        type: boolean
        default: false

jobs:
  patch:
    name: Build patch artifact
    runs-on: windows-latest


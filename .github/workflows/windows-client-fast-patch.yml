name: Windows fast patch build

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: What to build
        type: choice
        required: true
        default: client
        options:
          - client
          - service
          - both
      upload_full_bin:
        description: Upload full src/bin output
        type: boolean
        required: true
        default: false
      target_version:
        description: Optional Proton VPN release version, for example 4.4.1
        type: string
        required: false
        default: ''
  pull_request:
    branches:
      - marc/proton
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  pipeline:
    name: ${{ github.event_name == 'workflow_dispatch' && format('Build {0} patch artifact', inputs.build_mode) || 'Validate client and service changes' }}
    runs-on: windows-latest
    permissions:
      contents: read
      actions: write

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Remove obsolete server health workflow runs
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_WORKFLOW_ID: '311335663'
        run: |
          $ErrorActionPreference = 'Stop'

          $headers = @{
            Accept = 'application/vnd.github+json'
            Authorization = "Bearer $env:GH_TOKEN"
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          $runsUrl = "https://api.github.com/repos/$env:GITHUB_REPOSITORY/actions/workflows/$env:TARGET_WORKFLOW_ID/runs?per_page=100"
          $deleted = 0

          while ($true) {
            $response = Invoke-RestMethod -Uri $runsUrl -Headers $headers -Method Get
            $runs = @($response.workflow_runs)
            if ($runs.Count -eq 0) {
              break
            }

            foreach ($run in $runs) {
              $deleteUrl = "https://api.github.com/repos/$env:GITHUB_REPOSITORY/actions/runs/$($run.id)"
              Invoke-RestMethod -Uri $deleteUrl -Headers $headers -Method Delete
              Write-Host "Deleted obsolete workflow run $($run.id)."
              $deleted++
            }
          }

          $remaining = Invoke-RestMethod -Uri $runsUrl -Headers $headers -Method Get
          if (@($remaining.workflow_runs).Count -ne 0) {
            throw "Obsolete server health workflow runs still remain."
          }

          Write-Host "Deleted $deleted obsolete workflow run(s); zero remain."

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup Go
        if: ${{ github.event_name == 'pull_request' || inputs.build_mode == 'service' || inputs.build_mode == 'both' }}
        uses: actions/setup-go@v6
        with:
          go-version: '1.23.x'
          cache: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', '**/NuGet.config', '**/global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Prepare artifact folders
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/logs | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts/ProtonVPN.Client.Patch | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts/Installer | Out-Null

      - name: Clean previous build output
        if: github.event_name == 'workflow_dispatch'
        run: |
          Remove-Item -LiteralPath src/bin -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath artifacts/client-build-output -Recurse -Force -ErrorAction SilentlyContinue

      - name: Resolve target app version
        if: github.event_name == 'workflow_dispatch'
        id: app-version
        env:
          REQUESTED_TARGET_VERSION: ${{ inputs.target_version }}
        run: |
          $ErrorActionPreference = 'Stop'

          $requestedVersion = $env:REQUESTED_TARGET_VERSION.Trim()
          $assemblyInfoPath = 'src/GlobalAssemblyInfo.cs'

          if ($requestedVersion -eq '') {
            if (-not (Test-Path -LiteralPath $assemblyInfoPath -PathType Leaf)) {
              throw "Assembly info file was not found: $assemblyInfoPath"
            }

            $content = Get-Content -LiteralPath $assemblyInfoPath -Raw
            $match = [regex]::Match($content, '\[assembly:\s*AssemblyVersion\("(?<version>[^"\)]+)"\)\]')
            if (-not $match.Success) {
              throw "Could not determine the Proton VPN release version from $assemblyInfoPath"
            }

            $requestedVersion = $match.Groups['version'].Value
            Write-Host "No target_version override provided; using AssemblyVersion $requestedVersion."
          }

          if ($requestedVersion -notmatch '^\d+\.\d+\.\d+(?:\.\d+)?$') {
            throw "target_version must be a numeric three- or four-part version. Received '$requestedVersion'."
          }

          $parsedVersion = [Version]::Parse($requestedVersion)
          if ($parsedVersion.Build -lt 0) {
            throw "target_version must contain at least three numeric parts. Received '$requestedVersion'."
          }

          $targetVersion = '{0}.{1}.{2}' -f $parsedVersion.Major, $parsedVersion.Minor, $parsedVersion.Build

          if ($env:REQUESTED_TARGET_VERSION.Trim() -ne '') {
            Write-Host "Stamping build output for Proton VPN release $targetVersion."
            .\.github\scripts\set-assembly-version.ps1 -TargetVersion $targetVersion
          }

          Write-Host "Exact installed target folder: v$targetVersion"
          "target_version=$targetVersion" >> $env:GITHUB_OUTPUT

      - name: Run server health tests
        if: github.event_name == 'pull_request'
        run: |
          dotnet test src/Client/Common/ProtonVPN.Client.Common.UI.Tests/ProtonVPN.Client.Common.UI.Tests.csproj `
            --configuration Release -p:Platform=x64

      - name: Run server health tests twice
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.build_mode == 'client' || inputs.build_mode == 'both') }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          1..2 | ForEach-Object {
            $pass = $_
            dotnet test src/Client/Common/ProtonVPN.Client.Common.UI.Tests/ProtonVPN.Client.Common.UI.Tests.csproj `
              --configuration Release -p:Platform=x64 *>&1 |
              Tee-Object -FilePath "artifacts/logs/server-health-tests-$pass.log"

            if ($LASTEXITCODE -ne 0) {
              throw "Server health test pass $pass failed with exit code $LASTEXITCODE"
            }
          }

      - name: Restore client project
        if: ${{ github.event_name == 'pull_request' || inputs.build_mode == 'client' || inputs.build_mode == 'both' }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          dotnet restore src/Client/ProtonVPN.Client/ProtonVPN.Client.csproj --runtime win-x64 -bl:artifacts/logs/client-restore.binlog *>&1 |
            Tee-Object -FilePath artifacts/logs/client-restore.log

          if ($LASTEXITCODE -ne 0) {
            throw "Client restore failed with exit code $LASTEXITCODE"
          }

      - name: Restore service project
        if: ${{ github.event_name == 'pull_request' || inputs.build_mode == 'service' || inputs.build_mode == 'both' }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          dotnet restore src/ProtonVPN.Service/ProtonVPN.Service.csproj --runtime win-x64 -bl:artifacts/logs/service-restore.binlog *>&1 |
            Tee-Object -FilePath artifacts/logs/service-restore.log

          if ($LASTEXITCODE -ne 0) {
            throw "Service restore failed with exit code $LASTEXITCODE"
          }

      - name: Build client project
        if: ${{ github.event_name == 'pull_request' || inputs.build_mode == 'client' || inputs.build_mode == 'both' }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          dotnet build src/Client/ProtonVPN.Client/ProtonVPN.Client.csproj --configuration Release --runtime win-x64 --no-restore -p:Platform=x64 -v:minimal -bl:artifacts/logs/client-build.binlog *>&1 |
            Tee-Object -FilePath artifacts/logs/client-build.log

          if ($LASTEXITCODE -ne 0) {
            throw "Client build failed with exit code $LASTEXITCODE"
          }

      - name: Stage client patch build output
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.build_mode == 'client' || inputs.build_mode == 'both') }}
        run: |
          .\.github\scripts\stage-client-patch-output.ps1

      - name: Build service project
        if: ${{ github.event_name == 'pull_request' || inputs.build_mode == 'service' || inputs.build_mode == 'both' }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          dotnet build src/ProtonVPN.Service/ProtonVPN.Service.csproj --configuration Release --runtime win-x64 --no-restore -p:Platform=x64 -v:minimal -bl:artifacts/logs/service-build.binlog *>&1 |
            Tee-Object -FilePath artifacts/logs/service-build.log

          if ($LASTEXITCODE -ne 0) {
            throw "Service build failed with exit code $LASTEXITCODE"
          }

      - name: Package versioned patch artifacts
        if: github.event_name == 'workflow_dispatch'
        id: package
        env:
          BUILD_MODE: ${{ inputs.build_mode }}
          TARGET_VERSION: ${{ steps.app-version.outputs.target_version }}
          SOURCE_COMMIT: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref_name }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          .\.github\scripts\package-patch-artifacts.ps1 `
            -BuildMode $env:BUILD_MODE `
            -TargetVersion $env:TARGET_VERSION `
            -SourceCommit $env:SOURCE_COMMIT `
            -SourceRef $env:SOURCE_REF `
            -WorkflowRunId $env:WORKFLOW_RUN_ID

      - name: Upload raw patch artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: protonvpn-client-patch-${{ steps.app-version.outputs.target_version }}-${{ inputs.build_mode }}
          path: artifacts/ProtonVPN.Client.Patch
          if-no-files-found: error

      - name: Upload installer artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: protonvpn-custom-patch-installer-${{ steps.app-version.outputs.target_version }}-${{ inputs.build_mode }}
          path: artifacts/Installer/*.exe
          if-no-files-found: error

      - name: Upload full bin artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_full_bin && hashFiles('src/bin/**') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: protonvpn-client-bin-${{ steps.app-version.outputs.target_version }}-${{ inputs.build_mode }}
          path: src/bin
          if-no-files-found: error

      - name: Upload build logs
        if: ${{ github.event_name == 'workflow_dispatch' && always() && hashFiles('artifacts/logs/**') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: protonvpn-client-patch-logs-${{ steps.app-version.outputs.target_version }}-${{ inputs.build_mode }}
          path: artifacts/logs
          if-no-files-found: ignore

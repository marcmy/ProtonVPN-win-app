name: Port split tunnel patch

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to update with the split tunnel patch
        required: true
        default: marc/v4.4.1-split-tunnel-patterns
      source_branch:
        description: Branch to copy the known-good split tunnel patch files from
        required: true
        default: marc/v4.4.0-split-tunnel-patterns

permissions:
  contents: write

jobs:
  port:
    name: Port split tunnel files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Fetch source branch
        run: git fetch origin ${{ inputs.source_branch }}

      - name: Copy
name: Supply-chain audit

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - marc/proton
  schedule:
    # Every Monday at 07:23 UTC
    - cron: "23 7 * * 1"

jobs:
  trivy:
    name: Trivy security scan
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Scan repository with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

          # Report findings without turning every existing repository red.
          exit-code: "0"

      - name: Upload findings to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  syft:
    name: Generate independent SBOM
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Generate SPDX SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          artifact-name: sbom.spdx.json

          # Feed Syft's results back into GitHub's dependency graph.
          dependency-snapshot: true

          # Keep it as an Actions artifact rather than automatically
          # attaching it to every release.
          upload-artifact: true
          upload-release-assets: false
